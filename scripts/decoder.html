<!doctype html><html><head><meta charset="utf-8">
<title>minecraft in a thread decoder</title>
<style>
body{font-family:system-ui,sans-serif;background:#0e0e12;color:#e8e8ea;margin:0 auto;padding:24px;max-width:820px}
h1{font-size:20px}code{color:#8ecaff}
a.play{position:fixed;top:12px;right:16px;background:#4caf50;color:#fff;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:14px}
textarea{width:100%;height:44vh;box-sizing:border-box;background:#17171d;color:#cfe;border:1px solid #333;border-radius:8px;padding:10px;font-family:monospace;font-size:12px}
button{font-size:16px;padding:10px 22px;margin-top:12px;background:#4caf50;color:#fff;border:0;border-radius:8px;cursor:pointer}
#s{margin-left:10px;color:#9a9}
</style></head><body>
<a class="play" href="https://kuber.studio/minicraft">go play directly</a>
<h1>minecraft in a thread decoder</h1>
<p>Paste the thread's parts (every <code>compose/post?text=...</code> link from tweet 3 onward, in order) into the box and hit Play. Minecraft Classic runs right here, nothing leaves your browser. Or just tap "go play directly" up top.</p>
<textarea id="t" placeholder="paste the parts here..."></textarea>
<div><button onclick="go()">Play</button><span id="s"></span></div>
<script>
async function go(){
  var s=document.getElementById('s');s.textContent='decoding...';
  var raw=document.getElementById('t').value;
  var parts=[].concat.apply([],[...raw.matchAll(/text=([^\s#]+)/g)].map(function(m){try{return[decodeURIComponent(m[1])]}catch(e){return[m[1]]}}));
  if(!parts.length)parts=raw.split(/\s+/);
  var b64=parts.filter(function(p){return /^[A-Za-z0-9_-]{500,}$/.test(p)}).join('');
  if(!b64){s.textContent='no parts found. paste the game tweets (3 and on).';return}
  var std=b64.replace(/-/g,'+').replace(/_/g,'/');while(std.length%4)std+='=';
  var bin=atob(std),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);
  var html=await new Response(new Response(u).body.pipeThrough(new DecompressionStream('deflate-raw'))).text();
  s.textContent='decoded '+u.length.toLocaleString()+' bytes. loading...';
  party(function(){document.open();document.write(html);document.close();});
}
function party(done){
  var c=document.createElement('canvas');c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';
  c.width=innerWidth;c.height=innerHeight;document.body.appendChild(c);
  var x=c.getContext('2d'),P=[],i,col=['#f44','#4c8','#48f','#fd4','#e6f','#fff'];
  for(i=0;i<200;i++)P.push({x:Math.random()*c.width,y:-20-Math.random()*c.height,vx:(Math.random()-.5)*5,vy:2+Math.random()*5,r:3+Math.random()*5,c:col[i%6],a:Math.random()*6});
  var start=null;
  requestAnimationFrame(function f(t){
    if(start===null)start=t;
    x.clearRect(0,0,c.width,c.height);
    for(i=0;i<P.length;i++){var p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.a+=0.12;x.save();x.translate(p.x,p.y);x.rotate(p.a);x.fillStyle=p.c;x.fillRect(-p.r,-p.r,p.r*2,p.r*1.3);x.restore();}
    if(t-start<2000)requestAnimationFrame(f);else done();
  });
}
</script></body></html>
